<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inkwell — Stories Worth Reading</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F0E17; color: #FFFFFE; }
    select option { background: #1A1825; color: #FFFFFE; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SUPABASE_URL = "https://bohusdrjecedpoytaksv.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvaHVzZHJqZWNlZHBveXRha3N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MzA4MzEsImV4cCI6MjA5ODMwNjgzMX0.hEMxIBy1c248_0qQNa6Ef2ArKj-B_iIPtQNWmKFEyn8";

    const sb = async (path, options = {}, token = null) => {
      const headers = {
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${token || SUPABASE_ANON}`,
        "Content-Type": "application/json",
        ...(options.body ? { Prefer: "return=representation" } : {}),
        ...options.headers,
      };
      const res = await fetch(`${SUPABASE_URL}${path}`, { ...options, headers });
      if (res.status === 204 || res.status === 205) return null;
      return res.json();
    };

    const GENRES = ["All", "Mystery", "Slice of Life", "Sci-Fi", "Fantasy", "Romance", "Horror"];

    function App() {
      const [view, setView] = useState("feed");
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [stories, setStories] = useState([]);
      const [activeStory, setActiveStory] = useState(null);
      const [filter, setFilter] = useState("All");
      const [loading, setLoading] = useState(false);
      const [pageLoading, setPageLoading] = useState(true);
      const [notification, setNotification] = useState(null);
      const [authMode, setAuthMode] = useState("login");
      const [authForm, setAuthForm] = useState({ email: "", password: "", name: "" });
      const [authError, setAuthError] = useState("");
      const [publishStep, setPublishStep] = useState(1);
      const [publishForm, setPublishForm] = useState({ title: "", genre: "Mystery", body: "" });
      const [premiumStep, setPremiumStep] = useState(1);

      const showNotif = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(null), 3000);
      };

      const loadStories = useCallback(async () => {
        const storiesData = await sb("/rest/v1/stories?select=*&order=created_at.desc");
        const reactionsData = await sb("/rest/v1/reactions?select=*");
        if (Array.isArray(storiesData)) {
          const merged = storiesData.map((story) => ({
            ...story,
            reactions: Array.isArray(reactionsData)
              ? reactionsData.filter((r) => r.story_id === story.id)
              : [],
          }));
          setStories(merged);
        }
      }, []);

      const loadProfile = async (userId, token) => {
        const data = await sb(`/rest/v1/profiles?id=eq.${userId}&select=*`, {}, token);
        if (Array.isArray(data) && data.length > 0) setProfile(data[0]);
      };

      useEffect(() => {
        const stored = localStorage.getItem("inkwell_session");
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            setSession(parsed);
            loadProfile(parsed.user.id, parsed.access_token).finally(() => setPageLoading(false));
          } catch { setPageLoading(false); }
        } else { setPageLoading(false); }
        loadStories();
      }, [loadStories]);

      const freeStoriesLeft = () => {
        if (!profile) return 1; // default to free if profile still loading
        if (profile.is_premium) return Math.max(0, 4 - profile.stories_posted);
        return profile.stories_posted === 0 ? 1 : 0;
      };
      const mustPay = () => freeStoriesLeft() === 0;

      const handleSignup = async () => {
        setAuthError("");
        if (!authForm.name.trim() || !authForm.email.trim() || !authForm.password.trim()) { setAuthError("Please fill in all fields."); return; }
        if (authForm.password.length < 6) { setAuthError("Password must be at least 6 characters."); return; }
        setLoading(true);
        const data = await sb("/auth/v1/signup", { method: "POST", body: JSON.stringify({ email: authForm.email, password: authForm.password, data: { name: authForm.name } }) });
        if (data?.error) { setAuthError(data.error.message); setLoading(false); return; }
        if (!data?.access_token) { setAuthError("Check your email to confirm your account, then log in."); setLoading(false); return; }
        const token = data.access_token;
        const userId = data.user?.id;
        await sb("/rest/v1/profiles", { method: "POST", body: JSON.stringify({ id: userId, name: authForm.name, is_premium: false, stories_posted: 0 }) }, token);
        const sess = { access_token: token, user: data.user };
        setSession(sess);
        localStorage.setItem("inkwell_session", JSON.stringify(sess));
        await loadProfile(userId, token);
        setAuthForm({ email: "", password: "", name: "" });
        setView("feed");
        showNotif(`Welcome to Inkwell, ${authForm.name}!`);
        setLoading(false);
      };

      const handleLogin = async () => {
        setAuthError("");
        setLoading(true);
        const data = await sb("/auth/v1/token?grant_type=password", { method: "POST", body: JSON.stringify({ email: authForm.email, password: authForm.password }) });
        if (data?.error) { setAuthError(data.error.message); setLoading(false); return; }
        const token = data.access_token;
        const userId = data.user?.id;
        const sess = { access_token: token, user: data.user };
        setSession(sess);
        localStorage.setItem("inkwell_session", JSON.stringify(sess));
        await loadProfile(userId, token);
        setAuthForm({ email: "", password: "", name: "" });
        setView("feed");
        showNotif("Welcome back!");
        setLoading(false);
      };

      const handleLogout = async () => {
        if (session) await sb("/auth/v1/logout", { method: "POST" }, session.access_token);
        setSession(null); setProfile(null);
        localStorage.removeItem("inkwell_session");
        setView("feed");
        showNotif("You've been logged out.");
      };

      const handleUpgradeToPremium = async () => {
        if (!session || !profile) return;
        setLoading(true);
        await sb(`/rest/v1/profiles?id=eq.${profile.id}`, { method: "PATCH", body: JSON.stringify({ is_premium: true }) }, session.access_token);
        setProfile((p) => ({ ...p, is_premium: true }));
        setPremiumStep(1);
        setView("feed");
        showNotif("✦ Welcome to Premium!");
        setLoading(false);
      };

      const handlePublish = async () => {
        if (!publishForm.title.trim() || !publishForm.body.trim()) { showNotif("Please fill in all fields."); return; }
        setLoading(true);
        const preview = publishForm.body.slice(0, 120) + "...";
        await sb("/rest/v1/stories", { method: "POST", body: JSON.stringify({ author_id: profile.id, author_name: profile.name, is_author_premium: profile.is_premium, title: publishForm.title, genre: publishForm.genre, preview, body: publishForm.body }) }, session.access_token);
        const newCount = profile.stories_posted + 1;
        await sb(`/rest/v1/profiles?id=eq.${profile.id}`, { method: "PATCH", body: JSON.stringify({ stories_posted: newCount }) }, session.access_token);
        setProfile((p) => ({ ...p, stories_posted: newCount }));
        setPublishForm({ title: "", genre: "Mystery", body: "" });
        setPublishStep(1);
        await loadStories();
        setView("feed");
        showNotif("✦ Your story has been published!");
        setLoading(false);
      };

      const handleReact = async (storyId, emoji) => {
        if (!session) { setView("auth"); return; }
        const story = stories.find((s) => s.id === storyId);
        if (story?.reactions?.some((r) => r.user_id === session.user.id && r.emoji === emoji)) return;
        const newReaction = { emoji, user_id: session.user.id };
        setStories((prev) => prev.map((s) => s.id === storyId ? { ...s, reactions: [...(s.reactions || []), newReaction] } : s));
        if (activeStory?.id === storyId) setActiveStory((p) => ({ ...p, reactions: [...(p.reactions || []), newReaction] }));
        await sb("/rest/v1/reactions", { method: "POST", body: JSON.stringify({ story_id: storyId, user_id: session.user.id, emoji }) }, session.access_token);
      };

      const [speaking, setSpeaking] = useState(false);

      const handleListen = (text) => {
        if (speaking) {
          window.speechSynthesis.cancel();
          setSpeaking(false);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.95;
        utterance.pitch = 1;
        utterance.onend = () => setSpeaking(false);
        window.speechSynthesis.speak(utterance);
        setSpeaking(true);
      };
        reactions.reduce((acc, r) => { acc[r.emoji] = (acc[r.emoji] || 0) + 1; return acc; }, { "❤️": 0, "😮": 0, "😂": 0 });

      const hasReacted = (reactions = [], emoji) =>
        session ? reactions.some((r) => r.user_id === session.user.id && r.emoji === emoji) : false;

      const filtered = filter === "All" ? stories : stories.filter((s) => s.genre === filter);

      if (pageLoading) return (
        <div style={{ background: "#0F0E17", minHeight: "100vh", display: "flex", justifyContent: "center", alignItems: "center" }}>
          <span style={{ fontSize: 48, color: "#E8C547" }}>✦</span>
        </div>
      );

      if (view === "auth") return (
        <div style={st.root}>
          <nav style={st.nav}><span style={st.logo} onClick={() => setView("feed")}>✦ Inkwell</span></nav>
          <main style={st.main}>
            <div style={st.modal}>
              <div style={st.authTabs}>
                <button style={{...st.authTab, ...(authMode==="login" ? st.authTabActive : {})}} onClick={() => { setAuthMode("login"); setAuthError(""); }}>Log In</button>
                <button style={{...st.authTab, ...(authMode==="signup" ? st.authTabActive : {})}} onClick={() => { setAuthMode("signup"); setAuthError(""); }}>Sign Up</button>
              </div>
              {authMode === "signup" && (
                <div style={st.formGroup}>
                  <label style={st.label}>Your name</label>
                  <input style={st.input} placeholder="Jane Doe" value={authForm.name} onChange={(e) => setAuthForm((p) => ({...p, name: e.target.value}))} />
                </div>
              )}
              <div style={st.formGroup}>
                <label style={st.label}>Email</label>
                <input style={st.input} placeholder="you@example.com" value={authForm.email} onChange={(e) => setAuthForm((p) => ({...p, email: e.target.value}))} />
              </div>
              <div style={st.formGroup}>
                <label style={st.label}>Password</label>
                <input style={st.input} type="password" placeholder="••••••••" value={authForm.password} onChange={(e) => setAuthForm((p) => ({...p, password: e.target.value}))} />
              </div>
              {authError && <p style={st.authError}>{authError}</p>}
              <button style={{...st.publishBtn2, opacity: loading ? 0.6 : 1}} onClick={authMode === "login" ? handleLogin : handleSignup} disabled={loading}>
                {loading ? "Please wait..." : authMode === "login" ? "Log In" : "Create Account"}
              </button>
              <p style={{color:"#A7A9BE",fontSize:13,textAlign:"center",marginTop:16,cursor:"pointer"}} onClick={() => setView("feed")}>Continue reading without an account →</p>
            </div>
          </main>
        </div>
      );

      return (
        <div style={st.root}>
          {notification && <div style={st.notif}>{notification}</div>}
          <nav style={st.nav}>
            <span style={st.logo} onClick={() => setView("feed")}>✦ Inkwell</span>
            <div style={st.navRight}>
              {session ? (
                <>
                  {profile?.is_premium && <span style={st.premBadge}>✦ Premium</span>}
                  {!profile?.is_premium && <button style={st.navBtn} onClick={() => setView("premium")}>Go Premium — $1/mo</button>}
                  <span style={st.navUser}>{profile?.name}</span>
                  <button style={st.navBtnGhost} onClick={handleLogout}>Log out</button>
                  <button style={st.publishBtn} onClick={() => { setPublishStep(1); setView("publish"); }}>+ Post a Story</button>
                </>
              ) : (
                <>
                  <button style={st.navBtn} onClick={() => { setAuthMode("login"); setView("auth"); }}>Log In</button>
                  <button style={st.publishBtn} onClick={() => { setAuthMode("signup"); setView("auth"); }}>Sign Up</button>
                </>
              )}
            </div>
          </nav>

          {view === "feed" && (
            <main style={st.main}>
              <div style={st.hero}>
                <h1 style={st.heroTitle}>Stories worth reading.</h1>
                <p style={st.heroSub}>Real stories from real people. Read free. Publish for 50¢.</p>
              </div>
              <div style={st.filterRow}>
                {GENRES.map((g) => (
                  <button key={g} style={{...st.genreBtn, ...(filter===g ? st.genreBtnActive : {})}} onClick={() => setFilter(g)}>{g}</button>
                ))}
              </div>
              {filtered.length === 0 && (
                <div style={st.emptyState}>
                  <p style={{fontSize:40}}>✦</p>
                  <p style={{fontSize:20,fontWeight:700,margin:"8px 0"}}>No stories yet</p>
                  <p style={{color:"#A7A9BE",marginBottom:20}}>Be the first to publish!</p>
                  <button style={st.publishBtn} onClick={() => session ? setView("publish") : setView("auth")}>Post the First Story</button>
                </div>
              )}
              <div style={st.grid}>
                {filtered.map((story) => {
                  const counts = reactionCounts(story.reactions);
                  return (
                    <div key={story.id} style={st.card} onClick={() => { setActiveStory(story); setView("read"); }}>
                      <div style={st.cardTop}><span style={st.genreTag}>{story.genre}</span></div>
                      <h2 style={st.cardTitle}>{story.title}</h2>
                      <p style={st.cardPreview}>{story.preview}</p>
                      <div style={st.cardFooter}>
                        <span style={st.authorName}>{story.author_name}{story.is_author_premium && <span style={st.badge}> ✦</span>}</span>
                        <div style={st.reactionRow}>
                          {Object.entries(counts).map(([emoji, count]) => (
                            <span key={emoji} style={st.reactionBubble} onClick={(e) => { e.stopPropagation(); handleReact(story.id, emoji); }}>{emoji} {count}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </main>
          )}

          {view === "read" && activeStory && (
            <main style={st.main}>
              <button style={st.backBtn} onClick={() => setView("feed")}>← Back to Feed</button>
              <article style={st.article}>
                <span style={st.genreTag}>{activeStory.genre}</span>
                <h1 style={st.articleTitle}>{activeStory.title}</h1>
                <div style={st.articleMeta}>
                  <span>{activeStory.author_name}{activeStory.is_author_premium && <span style={st.badge}> ✦</span>}</span>
                  <button style={{...st.listenBtn, background: speaking ? "#f87171" : "#2a2836"}} onClick={() => handleListen(activeStory.title + ". " + activeStory.body)}>
                    {speaking ? "⏹ Stop" : "▶ Listen"}
                  </button>
                </div>
                <div style={st.divider} />
                <div style={st.articleBody}>
                  {activeStory.body.split("\n\n").map((para, i) => <p key={i} style={st.para}>{para}</p>)}
                </div>
                <div style={st.divider} />
                <div style={st.reactionSection}>
                  <p style={st.reactionLabel}>How did this make you feel?</p>
                  <div style={st.reactionBig}>
                    {Object.entries(reactionCounts(activeStory.reactions)).map(([emoji, count]) => (
                      <button key={emoji} style={{...st.reactionBigBtn, ...(hasReacted(activeStory.reactions, emoji) ? st.reactionActive : {})}} onClick={() => handleReact(activeStory.id, emoji)}>
                        <span style={{fontSize:28}}>{emoji}</span>
                        <span style={st.reactionCount}>{count}</span>
                      </button>
                    ))}
                  </div>
                  {!session && <p style={{color:"#A7A9BE",fontSize:13,marginTop:12}}><span style={{color:"#E8C547",cursor:"pointer"}} onClick={() => setView("auth")}>Log in</span> to react.</p>}
                </div>
              </article>
            </main>
          )}

          {view === "publish" && (
            <main style={st.main}>
              <button style={st.backBtn} onClick={() => setView("feed")}>← Cancel</button>
              <div style={st.modal}>
                {profile && (
                  <div style={st.slotBanner}>
                    {profile.is_premium ? `✦ Premium: ${freeStoriesLeft()} of 4 free slots remaining this month.` : profile.stories_posted === 0 ? "🎉 Your first story is free!" : "Your free story has been used. This post costs $0.50."}
                  </div>
                )}
                {publishStep === 1 && (
                  <>
                    <h2 style={st.modalTitle}>Post Your Story</h2>
                    <p style={st.modalSub}>Share your story with the Inkwell community.</p>
                    <div style={st.formGroup}><label style={st.label}>Title</label><input style={st.input} placeholder="Give your story a title..." value={publishForm.title} onChange={(e) => setPublishForm((p) => ({...p, title: e.target.value}))} /></div>
                    <div style={st.formGroup}>
                      <label style={st.label}>Genre</label>
                      <select style={st.input} value={publishForm.genre} onChange={(e) => setPublishForm((p) => ({...p, genre: e.target.value}))}>
                        {GENRES.filter((g) => g !== "All").map((g) => <option key={g}>{g}</option>)}
                      </select>
                    </div>
                    <div style={st.formGroup}><label style={st.label}>Your Story</label><textarea style={{...st.input, height:200, resize:"vertical"}} placeholder="Write your story here..." value={publishForm.body} onChange={(e) => setPublishForm((p) => ({...p, body: e.target.value}))} /></div>
                    <button style={{...st.publishBtn2, opacity: loading ? 0.6 : 1}} onClick={() => { if (!publishForm.title.trim() || !publishForm.body.trim()) { showNotif("Please fill in all fields."); return; } mustPay() ? setPublishStep(2) : handlePublish(); }} disabled={loading}>
                      {loading ? "Publishing..." : mustPay() ? "Continue to Payment →" : "Publish for Free ✦"}
                    </button>
                  </>
                )}
                {publishStep === 2 && (
                  <>
                    <h2 style={st.modalTitle}>One Last Step</h2>
                    <p style={st.modalSub}>A small fee keeps Inkwell running and spam-free.</p>
                    <div style={st.payCard}>
                      <div style={st.payRow}><span>Publishing fee</span><span style={st.payAmt}>$0.50</span></div>
                      <div style={st.divider} />
                      <div style={{...st.payRow, fontWeight:700}}><span>Total today</span><span style={st.payAmt}>$0.50</span></div>
                    </div>
                    <div style={st.fakeCard}>
                      <div style={st.formGroup}><label style={st.label}>Card number</label><input style={st.input} placeholder="4242 4242 4242 4242" /></div>
                      <div style={{display:"flex",gap:12}}>
                        <div style={{...st.formGroup,flex:1}}><label style={st.label}>Expiry</label><input style={st.input} placeholder="MM / YY" /></div>
                        <div style={{...st.formGroup,flex:1}}><label style={st.label}>CVC</label><input style={st.input} placeholder="123" /></div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:12}}>
                      <button style={st.backBtn2} onClick={() => setPublishStep(1)}>← Edit Story</button>
                      <button style={{...st.publishBtn2,flex:2}} onClick={handlePublish} disabled={loading}>{loading ? "Publishing..." : "Pay & Publish ✦"}</button>
                    </div>
                  </>
                )}
              </div>
            </main>
          )}

          {view === "premium" && (
            <main style={st.main}>
              <button style={st.backBtn} onClick={() => { setView("feed"); setPremiumStep(1); }}>← Back</button>
              <div style={st.modal}>
                {premiumStep === 1 && (
                  <>
                    <div style={st.premiumBadgeLarge}>✦ Premium</div>
                    <h2 style={st.modalTitle}>Upgrade to Premium</h2>
                    <p style={st.modalSub}>For writers serious about sharing their work.</p>
                    <div style={st.perks}>
                      {[["4 free story posts/month","Post up to 4 stories included in your plan. Extra stories are $0.50 each."],["✦ Premium badge","A gold badge next to your name on every story you publish."],["Priority in the feed","Your stories get featured at the top of the genre feed."],["Early access to new features","Be first to try new reactions, stats, and tools."]].map(([title, desc]) => (
                        <div key={title} style={st.perkItem}><div style={st.perkTitle}>{title}</div><div style={st.perkDesc}>{desc}</div></div>
                      ))}
                    </div>
                    <div style={st.priceBox}><span style={st.price}>$1</span><span style={st.pricePer}> / month</span></div>
                    {session ? (profile?.is_premium
                      ? <div style={{...st.publishBtn2,background:"#1A1825",color:"#4ade80",cursor:"default",textAlign:"center"}}>✓ You're already Premium</div>
                      : <button style={st.publishBtn2} onClick={() => setPremiumStep(2)}>Subscribe for $1/month →</button>
                    ) : <button style={st.publishBtn2} onClick={() => { setAuthMode("signup"); setView("auth"); }}>Sign up to Subscribe</button>}
                    <p style={{color:"#A7A9BE",fontSize:12,textAlign:"center",marginTop:12}}>Cancel anytime. No hidden fees.</p>
                  </>
                )}
                {premiumStep === 2 && (
                  <>
                    <h2 style={st.modalTitle}>Payment Details</h2>
                    <p style={st.modalSub}>Your Premium subscription starts today.</p>
                    <div style={st.payCard}>
                      <div style={st.payRow}><span>Inkwell Premium</span><span style={st.payAmt}>$1.00/mo</span></div>
                      <div style={st.divider} />
                      <div style={{...st.payRow,fontWeight:700}}><span>Total today</span><span style={st.payAmt}>$1.00</span></div>
                    </div>
                    <div style={st.fakeCard}>
                      <div style={st.formGroup}><label style={st.label}>Card number</label><input style={st.input} placeholder="4242 4242 4242 4242" /></div>
                      <div style={{display:"flex",gap:12}}>
                        <div style={{...st.formGroup,flex:1}}><label style={st.label}>Expiry</label><input style={st.input} placeholder="MM / YY" /></div>
                        <div style={{...st.formGroup,flex:1}}><label style={st.label}>CVC</label><input style={st.input} placeholder="123" /></div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:12}}>
                      <button style={st.backBtn2} onClick={() => setPremiumStep(1)}>← Go Back</button>
                      <button style={{...st.publishBtn2,flex:2}} onClick={handleUpgradeToPremium} disabled={loading}>{loading ? "Processing..." : "Pay & Subscribe ✦"}</button>
                    </div>
                    <p style={{color:"#A7A9BE",fontSize:12,textAlign:"center",marginTop:12}}>Cancel anytime. No hidden fees.</p>
                  </>
                )}
              </div>
            </main>
          )}

          <footer style={st.footer}>
            <span style={st.logo}>✦ Inkwell</span>
            <span style={{color:"#A7A9BE",fontSize:13}}>Stories worth reading.</span>
          </footer>
        </div>
      );
    }

    const st = {
      root:{background:"#0F0E17",minHeight:"100vh",color:"#FFFFFE",fontFamily:"Georgia,serif",display:"flex",flexDirection:"column"},
      nav:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 32px",borderBottom:"1px solid #2a2836",position:"sticky",top:0,background:"#0F0E17",zIndex:100,flexWrap:"wrap",gap:12},
